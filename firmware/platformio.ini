; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env]
lib_ldf_mode = chain
lib_deps =
    miguelbalboa/MFRC522@^1.4.12
    madhephaestus/ESP32Servo@^3.2.1
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.4.1

; ESP32 Wroom 
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
lib_ldf_mode  = chain
lib_deps =
    miguelbalboa/MFRC522@^1.4.12
    madhephaestus/ESP32Servo@^3.2.1
    knolleary/PubSubClient@^2.8

; -----------------------------------------------------------------
; Perfil comentado para ESP32-S3
; Descomente este bloco e ajuste o `board` para o modelo exato do seu
; módulo S3 quando quiser compilar para essa placa.
;
; [env:esp32s3]
; platform      = espressif32
; board         = esp32-s3-devkitc-1
; framework     = arduino
; monitor_speed = 115200
; lib_deps      = ${env.lib_deps}
; lib_ldf_mode  = ${env.lib_ldf_mode}
;
; Observação: se usar USB nativo da placa S3, pode ser necessário
; ajustar porta de upload/monitor conforme o seu hardware.
 
; [env:seeed_xiao_esp32_c6]
; platform = https://github.com/Seeed-Studio/platform-seeedboards.git
; board = seeed-xiao-esp32-c6
; framework = arduino
; build_flags = -D SOC_WIFI_SUPPORTED=1
; lib_deps = ${env.lib_deps}
; lib_ldf_mode = ${env.lib_ldf_mode}
